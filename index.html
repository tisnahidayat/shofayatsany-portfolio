<!doctype html>
<html lang="id">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="icon" type="image/png" href="/Meta.jpg" /> -->

    <!-- preload Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />

    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"

    <!-- SEO Utama -->
    <title>
      Shofaya Tsany Ediningtyas | Apoteker & Profesional Kefarmasian

    />
    <meta name="author" content="Shofaya Tsany Ediningtyas" />

    <!-- Google Search Console -->

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#030014" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta property="og:type" content="website" />

    <meta name="twitter:url" content="https://shofayatsany.vercel.app/" />
    <meta name="twitter:title" content="Shofaya Tsany Ediningtyas | Apoteker" />
    <meta
      name="twitter:description"
      content="Website resmi dan portofolio profesional Shofaya Tsany Ediningtyas, seorang Apoteker terpercaya."
    />
    <!-- <meta name="twitter:image" content="https://shofayatsany.vercel.app/Meta.png" /> -->

    <!-- Canonical -->

        "@context": "https://schema.org",

        "name": "Shofaya Tsany Ediningtyas",
        "url": "https://shofayatsany.vercel.app",

          "https://www.linkedin.com/in/shofaya-tsany",
          "https://www.instagram.com/shofayatsany"
        ]
      }
    </script>
  </head>
